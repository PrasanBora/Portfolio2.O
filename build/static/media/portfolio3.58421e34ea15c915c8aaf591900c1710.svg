<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-label="Prasan Bora Portfolio 3.0 — Next.js homepage">
  <defs>
    <radialGradient id="amb" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#0a201d"/>
      <stop offset="60%" stop-color="#050a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7fd3cb"/>
      <stop offset="100%" stop-color="#4ea69e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="950" fill="url(#amb)"/>

  <!-- Top border -->
  <line x1="0" y1="62" x2="1600" y2="62" stroke="#1d2926" stroke-width="1.5"/>

  <!-- ----- HEADER ----- -->
  <!-- Brand -->
  <circle cx="306" cy="32" r="6" fill="#3fc7bc"/>
  <text x="322" y="38" font-family="JetBrains Mono, monospace" font-size="14" fill="#cfd6d4">Prasan Bora</text>

  <!-- Nav links -->
  <g font-family="Inter, sans-serif" font-size="14" fill="#9aa6a4">
    <text x="660" y="38">About</text>
    <text x="725" y="38">Works</text>
    <text x="790" y="38">Projects</text>
    <text x="864" y="38">Skills — Tech Stacks</text>
    <text x="1018" y="38">Contact</text>
  </g>

  <!-- Right icons -->
  <g fill="none" stroke="#9aa6a4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- mail -->
    <rect x="1248" y="24" width="20" height="14" rx="2"/>
    <polyline points="1248,28 1258,36 1268,28"/>
    <!-- github -->
    <path d="M1290 38c-3 0 -3 -2 -4 -3 -1 -1 -2 -2 -3 -2 c0 -1 1 -1 2 -1 c3 0 5 2 6 4 z M1294 40 v-4 c0 -1 0 -2 -1 -3 c3 0 5 -2 5 -5 c0 -1 0 -2 -1 -3 c0 -1 1 -2 0 -4 c0 0 -1 0 -3 1 c-2 -1 -4 -1 -6 0 c-2 -1 -3 -1 -3 -1 c-1 2 0 3 0 4 c-1 1 -1 2 -1 3 c0 3 2 5 5 5 c-1 1 -1 2 -1 3 v4" />
    <!-- linkedin -->
    <rect x="1320" y="22" width="16" height="16" rx="2"/>
    <line x1="1324" y1="28" x2="1324" y2="34"/>
    <line x1="1328" y1="34" x2="1328" y2="30"/>
    <path d="M1328 30c0 -2 4 -2 4 0v4"/>
    <circle cx="1324" cy="26" r="0.8" fill="#9aa6a4"/>
    <!-- sun (theme toggle) -->
    <circle cx="1352" cy="30" r="4"/>
    <line x1="1352" y1="22" x2="1352" y2="24"/>
    <line x1="1352" y1="36" x2="1352" y2="38"/>
    <line x1="1344" y1="30" x2="1346" y2="30"/>
    <line x1="1358" y1="30" x2="1360" y2="30"/>
  </g>

  <!-- ----- HERO PILLS ----- -->
  <g font-family="Inter, sans-serif" font-size="18" fill="#9aa6a4">
    <text x="685" y="395">Software Engineer</text>
    <circle cx="846" cy="389" r="3.5" fill="#3fc7bc"/>
    <text x="864" y="395">Full Stack Developer</text>
    <circle cx="1042" cy="389" r="3.5" fill="#3fc7bc"/>
    <text x="1060" y="395">India</text>
  </g>

  <!-- ----- HEADLINE ----- -->
  <text x="800" y="525" text-anchor="middle"
        font-family="Plus Jakarta Sans, Inter, sans-serif"
        font-weight="800" font-size="86" fill="#fcfdfd"
        letter-spacing="-2">Hi, I&apos;m Prasan Bora</text>

  <!-- ----- LEAD ----- -->
  <g font-family="Inter, sans-serif" font-size="20" fill="#9aa6a4" text-anchor="middle">
    <text x="800" y="595">I'm Prasan Bora — a software engineer building web apps, mobile apps, backend</text>
    <text x="800" y="625">systems, and AI integrations. Clean code, shipped fast, with Next.js, React Native,</text>
    <text x="800" y="655">NestJS, and TypeScript.</text>
  </g>

  <!-- ----- CTAs ----- -->
  <!-- Primary -->
  <g transform="translate(680,705)">
    <rect width="190" height="56" rx="28" fill="url(#accent)"/>
    <text x="80" y="36" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#06201d">View My Work</text>
    <path d="M150 28 L162 28 M156 22 L162 28 L156 34" stroke="#06201d" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Outline -->
  <g transform="translate(890,705)">
    <rect width="190" height="56" rx="28" fill="none" stroke="#3a4a48" stroke-width="2"/>
    <text x="95" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#cfd6d4">Let&apos;s Connect</text>
  </g>

  <!-- ----- SCROLL INDICATOR ----- -->
  <text x="800" y="930" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5e6f6c" letter-spacing="3">SCROLL</text>
</svg>
